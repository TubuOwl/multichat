<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mancing Bareng 🎣</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#0a1628;overflow:hidden;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block;image-rendering:pixelated}
/* LOGIN */
#login-screen{position:absolute;inset:0;background:linear-gradient(160deg,#06101e,#0d2040,#091828);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:rgba(10,20,40,.96);border:2px solid rgba(80,160,255,.3);border-radius:20px;padding:26px 22px;width:min(350px,92vw);backdrop-filter:blur(12px)}
.login-title{text-align:center;color:#7ecfff;font-size:19px;letter-spacing:2px;margin-bottom:3px}
.login-sub{text-align:center;color:#3a6a9a;font-size:10px;margin-bottom:20px;letter-spacing:1px}
.field-label{color:#5a9abf;font-size:10px;letter-spacing:1px;margin-bottom:5px;display:block}
.text-input{width:100%;background:rgba(0,0,0,.4);border:1.5px solid rgba(80,140,200,.3);border-radius:8px;color:#d0e8ff;font-family:'Courier New',monospace;font-size:13px;padding:10px 12px;outline:none;margin-bottom:14px}
.text-input:focus{border-color:rgba(80,180,255,.6)}
.gender-row{display:flex;gap:10px;margin-bottom:16px}
.gender-btn{flex:1;padding:10px;border-radius:10px;border:2px solid rgba(80,140,200,.3);background:rgba(0,0,0,.3);color:#6a9abf;font-size:11px;font-family:'Courier New',monospace;cursor:pointer;text-align:center;transition:all .2s}
.gender-btn.active{border-color:#7ecfff;background:rgba(30,70,120,.5);color:#d0e8ff}
.gender-icon{font-size:24px;display:block;margin-bottom:3px}
.color-row{display:flex;gap:7px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.color-dot.selected{border-color:#fff;transform:scale(1.2)}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,#1a5aaa,#2a7aee);border:none;border-radius:10px;color:#d0f0ff;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;cursor:pointer;letter-spacing:1px}
.login-err{color:#ff6666;font-size:10px;text-align:center;margin-top:7px;min-height:13px}
/* HUD */
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);font-size:10px}
.topstat{color:#7ecfff}.topstat b{color:#fff}
#online-badge{background:rgba(0,200,80,.2);border:1px solid rgba(0,200,80,.4);border-radius:10px;padding:2px 8px;color:#4ef;font-size:9px}
/* MUSIC */
#music-bar{position:absolute;top:38px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);border:1px solid rgba(80,140,200,.25);border-radius:20px;padding:4px 12px;display:flex;align-items:center;gap:8px;pointer-events:all;z-index:20}
#music-title{color:#adf;font-size:9px;max-width:130px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#music-toggle{background:none;border:none;color:#7ecfff;font-size:14px;cursor:pointer;padding:0 2px}
#music-prev,#music-next{background:none;border:none;color:#5a9abf;font-size:11px;cursor:pointer;padding:0 2px}
/* CHAT */
#chat-panel{position:absolute;bottom:108px;left:8px;width:min(270px,54vw);pointer-events:all}
#chat-msgs{max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;margin-bottom:5px}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:rgba(80,140,200,.3);border-radius:3px}
.chat-msg{background:rgba(0,0,0,.7);border-left:2px solid;border-radius:0 6px 6px 0;padding:3px 7px;font-size:10px;line-height:1.4;animation:fadeIn .2s}
.npc-msg{background:rgba(20,10,40,.8);border-left:2px solid #c084fc}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.chat-name{font-weight:bold;font-size:9px}
.chat-text{color:#d0e8ff}
.sys-msg{color:#5a9abf;font-style:italic;font-size:9px;padding:2px 6px}
#chat-input-row{display:flex;gap:5px}
#chat-input{flex:1;background:rgba(0,0,0,.7);border:1.5px solid rgba(80,140,200,.3);border-radius:8px;color:#d0e8ff;font-family:'Courier New',monospace;font-size:11px;padding:7px 10px;outline:none;min-width:0}
#chat-input:focus{border-color:rgba(80,180,255,.5)}
#chat-send{background:rgba(30,80,160,.8);border:1.5px solid rgba(80,140,200,.4);border-radius:8px;color:#7ecfff;font-size:12px;padding:6px 10px;cursor:pointer}
/* MACHA NPC TYPING */
#macha-typing{position:absolute;bottom:108px;left:8px;display:none;pointer-events:none}
.typing-bubble{background:rgba(30,10,60,.85);border:1.5px solid rgba(180,100,255,.4);border-radius:12px;padding:5px 12px;color:#d0b8ff;font-size:10px;display:flex;align-items:center;gap:6px}
.dot-anim span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#c084fc;margin:0 1px;animation:dotBounce .9s infinite}
.dot-anim span:nth-child(2){animation-delay:.2s}.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
/* EMOJI PICKER */
#emoji-picker{position:absolute;bottom:88px;right:68px;background:rgba(8,14,28,.96);border:1.5px solid rgba(80,100,200,.4);border-radius:14px;padding:10px;display:none;pointer-events:all;z-index:60;width:200px}
.ep-tabs{display:flex;gap:4px;margin-bottom:7px;border-bottom:1px solid rgba(80,100,200,.2);padding-bottom:6px}
.ep-tab{font-size:14px;cursor:pointer;padding:3px 6px;border-radius:6px;opacity:.5}
.ep-tab.active{opacity:1;background:rgba(80,100,200,.2)}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.ep-emoji{font-size:18px;cursor:pointer;padding:4px;border-radius:6px;text-align:center;transition:background .1s}
.ep-emoji:hover{background:rgba(255,255,255,.12)}
/* INVENTORY */
#inv-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(6,14,28,.97);border:2px solid rgba(80,140,200,.4);border-radius:14px;padding:14px;width:min(310px,90vw);max-height:70vh;overflow-y:auto;display:none;pointer-events:all;z-index:70}
#inv-panel h2{color:#7ecfff;font-size:12px;margin-bottom:10px;border-bottom:1px solid rgba(80,140,200,.3);padding-bottom:6px;letter-spacing:1px}
.inv-row{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;margin-bottom:3px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.inv-em{font-size:18px;width:24px;text-align:center}.inv-n{color:#d0eeff;font-size:10px;font-weight:bold}.inv-d{color:#4a8aaa;font-size:9px}
.inv-c{color:#fc6;font-weight:bold;font-size:11px;background:rgba(80,50,0,.5);padding:2px 7px;border-radius:4px;margin-left:auto}
.close-btn{text-align:center;margin-top:10px;color:#7ecfff;cursor:pointer;font-size:11px;border:1px solid rgba(80,140,200,.3);padding:7px;border-radius:6px}
/* JOY */
#joy-zone{position:absolute;bottom:18px;left:14px;width:120px;height:120px;pointer-events:all}
#joy-base{position:absolute;inset:6px;border-radius:50%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18)}
#joy-knob{position:absolute;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.5),rgba(255,255,255,.18));border:1.5px solid rgba(255,255,255,.5);top:38px;left:38px}
/* BUTTONS */
#act-btns{position:absolute;bottom:18px;right:12px;display:flex;flex-direction:column;align-items:flex-end;gap:7px;pointer-events:all}
.abtn{border-radius:50%;border:2px solid;font-size:10px;font-weight:bold;font-family:'Courier New',monospace;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.3;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.abtn:active{transform:scale(.88);opacity:.8}
#btn-a{width:70px;height:70px;background:rgba(0,90,180,.85);border-color:#4af;color:#adf}
#btn-inv{width:50px;height:50px;background:rgba(60,30,0,.85);border-color:#fa6;color:#fda;font-size:9px}
#btn-emoji{width:50px;height:50px;background:rgba(60,20,80,.8);border-color:#c8a;color:#ecf;font-size:9px}
/* TOAST */
#toast{position:absolute;top:42%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1.5px solid rgba(255,180,0,.5);border-radius:14px;padding:7px 18px;color:#ffe066;font-size:11px;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:88vw;text-align:center;pointer-events:none}
/* FISH HUD */
#fish-hud{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:230px;display:none;background:rgba(0,0,0,.6);border:1px solid rgba(80,140,200,.3);border-radius:10px;padding:8px 12px}
.bar-wrap{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.bar-lbl{color:#adf;font-size:9px;width:50px;text-align:right;flex-shrink:0}
.bar-bg2{flex:1;height:11px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);border-radius:4px;overflow:hidden}
.bar-f2{height:100%;border-radius:3px;transition:width .1s,background .15s}
#fish-name-lbl{color:#ffe066;font-size:9px;text-align:center;margin-top:3px}
/* MINIMAP */
#minimap{position:absolute;top:48px;right:10px;border:1.5px solid rgba(80,140,200,.3);border-radius:6px}
/* HINT */
#hint{position:absolute;bottom:150px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid rgba(255,200,0,.4);border-radius:10px;padding:4px 14px;color:#ffe;font-size:10px;display:none;pointer-events:none}
/* NPC interact hint */
#npc-hint{position:absolute;bottom:168px;left:50%;transform:translateX(-50%);background:rgba(20,5,40,.85);border:1px solid rgba(180,100,255,.4);border-radius:10px;padding:4px 14px;color:#d8b0ff;font-size:10px;display:none;pointer-events:none}
/* FISHING MINIGAME OVERLAY */
#fish-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;gap:8px;pointer-events:all;z-index:50}
#fish-overlay-inner{background:rgba(0,5,20,.9);border:2px solid rgba(80,160,255,.4);border-radius:16px;padding:16px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;min-width:240px}
#fo-title{color:#7ecfff;font-size:11px;letter-spacing:1px}
#fo-meter-bg{width:200px;height:20px;background:rgba(0,0,0,.6);border:1.5px solid rgba(80,140,200,.3);border-radius:8px;overflow:hidden;position:relative}
#fo-meter-fill{height:100%;border-radius:7px;transition:width .08s,background .1s}
#fo-fish-bar-bg{width:200px;height:14px;background:rgba(0,0,0,.5);border:1.5px solid rgba(80,200,80,.3);border-radius:6px;overflow:hidden}
#fo-fish-bar{height:100%;border-radius:5px;background:#44ff44}
#fo-fish-info{color:#ffe066;font-size:11px}
#fo-tap-btn{width:130px;height:52px;background:rgba(0,120,20,.85);border:2.5px solid #4f4;border-radius:14px;color:#afffaa;font-family:'Courier New',monospace;font-size:14px;font-weight:bold;cursor:pointer;letter-spacing:1px}
#fo-tap-btn:active{transform:scale(.92);opacity:.8}
#fo-wait{color:#5a9abf;font-size:10px}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">🎣 MANCING BARENG</div>
    <div class="login-sub">MULTIPLAYER FISHING WORLD</div>
    <label class="field-label">NAMA KAMU</label>
    <input class="text-input" id="inp-name" maxlength="16" placeholder="masukkan nama..." autocomplete="off">
    <label class="field-label">PILIH KARAKTER</label>
    <div class="gender-row">
      <div class="gender-btn active" id="g-male" onclick="selectGender('male')"><span class="gender-icon">👨</span>COWOK</div>
      <div class="gender-btn" id="g-female" onclick="selectGender('female')"><span class="gender-icon">👩</span>CEWEK</div>
    </div>
    <label class="field-label">WARNA NAMA</label>
    <div class="color-row" id="color-row"></div>
    <button class="login-btn" onclick="doLogin()">MASUK KE DUNIA 🌍</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="topbar">
    <div class="topstat">⭐ <b id="sc">0</b> &nbsp;🐟 <b id="fc">0</b></div>
    <div id="online-badge">🟢 <b id="online-c">1</b> online</div>
    <div class="topstat">🏆 <b id="bf">-</b></div>
  </div>
  <div id="music-bar">
    <button id="music-prev" onclick="prevTrack()">⏮</button>
    <button id="music-toggle" onclick="toggleMusic()">▶</button>
    <div id="music-title">♪ Loading...</div>
    <button id="music-next" onclick="nextTrack()">⏭</button>
  </div>
  <canvas id="minimap" width="78" height="78"></canvas>
  <div id="toast"></div>
  <div id="hint">🎣 Tap ACTION untuk mancing</div>
  <div id="npc-hint">💬 Tap ACTION untuk ngobrol dengan Macha</div>
  <div id="fish-hud">
    <div class="bar-wrap"><span class="bar-lbl">SENAR</span><div class="bar-bg2"><div class="bar-f2" id="tension-f"></div></div></div>
    <div class="bar-wrap"><span class="bar-lbl">STAMINA</span><div class="bar-bg2"><div class="bar-f2" id="fishhp-f"></div></div></div>
    <div id="fish-name-lbl"></div>
  </div>
  <!-- FISHING OVERLAY -->
  <div id="fish-overlay">
    <div id="fish-overlay-inner">
      <div id="fo-title">🎣 MANCING</div>
      <div id="fo-wait">Melempar kail... menunggu ikan...</div>
      <div id="fo-meter-bg"><div id="fo-meter-fill" style="width:50%"></div></div>
      <div id="fo-fish-bar-bg" style="display:none"><div id="fo-fish-bar" style="width:80%"></div></div>
      <div id="fo-fish-info"></div>
      <button id="fo-tap-btn" style="display:none" onclick="doTap()">💪 TAP!</button>
    </div>
  </div>
  <div id="chat-panel">
    <div id="chat-msgs"></div>
    <div id="macha-typing" style="display:none">
      <div class="typing-bubble">😺 Macha sedang mengetik... <div class="dot-anim"><span></span><span></span><span></span></div></div>
    </div>
    <div id="chat-input-row">
      <input id="chat-input" maxlength="80" placeholder="ketik pesan..." autocomplete="off">
      <button id="chat-send" onclick="sendChat()">➤</button>
    </div>
  </div>
  <div id="emoji-picker">
    <div class="ep-tabs">
      <div class="ep-tab active" onclick="switchEpTab(0)">😀</div>
      <div class="ep-tab" onclick="switchEpTab(1)">🎣</div>
      <div class="ep-tab" onclick="switchEpTab(2)">❤️</div>
    </div>
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>
  <div id="inv-panel">
    <h2>🎒 HASIL TANGKAPAN</h2>
    <div id="inv-list"></div>
    <div class="close-btn" onclick="toggleInv()">✕ Tutup</div>
  </div>
  <div id="joy-zone"><div id="joy-base"></div><div id="joy-knob"></div></div>
  <div id="act-btns">
    <div style="display:flex;gap:7px;align-items:center">
      <button class="abtn" id="btn-emoji" onclick="toggleEmoji()">😊<br>Emot</button>
      <button class="abtn" id="btn-inv" onclick="toggleInv()">🎒<br>Tas</button>
    </div>
    <button class="abtn" id="btn-a" onclick="handleAction()">🎣<br>ACTION</button>
  </div>
</div>

<script>
// ═══════════════ CANVAS ═══════════════
const C=document.getElementById('gc'),ctx=C.getContext('2d');
const MM=document.getElementById('minimap'),mctx=MM.getContext('2d');
C.width=window.innerWidth;C.height=window.innerHeight;
const W=C.width,H=C.height;
const TILE=46,WW=32,WH=32;

// ═══════════════ MAP ═══════════════
const MAP=[];
for(let r=0;r<WH;r++){MAP[r]=[];for(let c=0;c<WW;c++)MAP[r][c]=0;}
const LX=21,LY=16;
// Lake
for(let r=0;r<WH;r++)for(let c=0;c<WW;c++){
  const d=Math.sqrt((c-LX)**2+((r-LY)*.95)**2);
  if(d<5.2) MAP[r][c]=1; else if(d<6.8) MAP[r][c]=2; else if(d<8.2) MAP[r][c]=3;
}
// Dock
[[14,13],[14,14],[15,13],[15,14],[15,15],[16,13],[16,14]].forEach(([r,c])=>MAP[r][c]=4);
// Paths
for(let c=6;c<=13;c++) if(MAP[15][c]<3) MAP[15][c]=5;
for(let r=6;r<=15;r++) if(MAP[r][8]<3) MAP[r][8]=5;
for(let c=2;c<=8;c++) if(MAP[6][c]<3) MAP[6][c]=5;
for(let c=8;c<=20;c++) if(MAP[10][c]<3) MAP[10][c]=5;
for(let r=6;r<=10;r++) if(MAP[r][14]<3) MAP[r][14]=5;
for(let r=10;r<=15;r++) if(MAP[r][20]<3) MAP[r][20]=5;
// Random flowers
for(let r=0;r<WH;r++)for(let c=0;c<WW;c++) if(MAP[r][c]===0&&(c*37+r*71)%100<10) MAP[r][c]=7;
// Hills border
for(let r=0;r<WH;r++)for(let c=0;c<WW;c++) if(c<2||c>29||r<2||r>29) MAP[r][c]=6;

// Buildings (house footprints - mark as unwalkable type 8)
const HOUSES=[
  {tx:5,ty:4,w:4,h:3,wall:'#8B6914',roof:'#8B2020',name:'Rumah Merah'},
  {tx:14,ty:4,w:3,h:3,wall:'#5a4a8a',roof:'#2a1a6a',name:'Rumah Biru'},
  {tx:23,ty:5,w:4,h:3,wall:'#4a7a3a',roof:'#2a4a1a',name:'Rumah Hijau'},
  {tx:24,ty:18,w:4,h:3,wall:'#8a5a2a',roof:'#5a3010',name:'Rumah Kayu'},
];
HOUSES.forEach(h=>{for(let r=h.ty;r<h.ty+h.h;r++)for(let c=h.tx;c<h.tx+h.w;c++)MAP[r][c]=8;});

// Trees & Rocks
const TREES=[],ROCKS=[];
for(let r=2;r<WH-2;r++)for(let c=2;c<WW-2;c++){
  if(MAP[r][c]===0||MAP[r][c]===7){
    const h=(c*131+r*79)%100;
    if(h<14) TREES.push({tx:c,ty:r,v:(c+r)%3,s:.75+Math.random()*.45});
    else if(h<20) ROCKS.push({tx:c,ty:r,s:.5+Math.random()*.6});
  }
}

function walkable(wx,wy){
  const c=Math.floor(wx/TILE),r=Math.floor(wy/TILE);
  if(c<0||c>=WW||r<0||r>=WH) return false;
  const t=MAP[r][c];return t!==1&&t!==2&&t!==6&&t!==8;
}
function nearDock(){
  const c=Math.floor(ME.x/TILE),r=Math.floor(ME.y/TILE);
  for(let dc=-2;dc<=2;dc++)for(let dr=-2;dr<=2;dr++){const nc=c+dc,nr=r+dr;if(MAP[nr]&&(MAP[nr][nc]===4||MAP[nr][nc]===2)) return true;}
  return false;
}
function distToNPC(npc){return Math.sqrt((ME.x-npc.x)**2+(ME.y-npc.y)**2);}

// ═══════════════ FISH DATA ═══════════════
const FISH=[
  {name:'Ikan Mas',e:'🐟',r:255,g:200,b:30,w:1,pts:10,rarity:.28,desc:'1-2kg'},
  {name:'Ikan Lele',e:'🐠',r:70,g:100,b:210,w:2,pts:25,rarity:.20,desc:'2-5kg'},
  {name:'Ikan Nila',e:'🐡',r:210,g:100,b:30,w:2,pts:35,rarity:.17,desc:'3-6kg'},
  {name:'Gurame',e:'🦈',r:30,g:200,b:160,w:3,pts:60,rarity:.13,desc:'5-12kg'},
  {name:'Tuna',e:'🐬',r:50,g:80,b:220,w:4,pts:100,rarity:.09,desc:'15-30kg'},
  {name:'Arwana',e:'🐉',r:160,g:230,b:50,w:5,pts:200,rarity:.04,desc:'30-60kg'},
  {name:'Sepatu',e:'👟',r:130,g:90,b:60,w:1,pts:-5,rarity:.025,desc:'...'},
];
function randFish(){let r=Math.random(),c=0;for(const f of FISH){c+=f.rarity;if(r<c)return f;}return FISH[0];}
const swFish=[];
for(let i=0;i<10;i++) swFish.push({x:(LX-3+Math.random()*6)*TILE,y:(LY-3+Math.random()*6)*TILE,vx:(Math.random()<.5?1:-1)*(.3+Math.random()*.5),vy:(Math.random()<.5?1:-1)*(.15+Math.random()*.3),type:FISH[Math.floor(Math.random()*5)],anim:Math.random()*6.28,op:.4+Math.random()*.4});

// ═══════════════ NPC MACHA ═══════════════
const MACHA={
  x:10*TILE, y:8*TILE,
  name:'Macha',

let ws=null;
const WS_URL=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws';
function connectWS(){
  try{ws=new WebSocket(WS_URL);}catch{return;}
  ws.onopen=()=>{ws.send(JSON.stringify({type:'set_name',name:ME.name}));sysMsg('Terhubung ke server!');};
  ws.onmessage=e=>{try{handleWS(JSON.parse(e.data));}catch{}};
  ws.onclose=()=>{sysMsg('Koneksi terputus...');setTimeout(connectWS,4000);};
  ws.onerror=()=>ws.close();
}
function handleWS(d){
  if(d.type==='ping'){ws.send(JSON.stringify({type:'pong'}));return;}
  if(d.type==='viewer_list'){
    document.getElementById('online-c').textContent=d.count||1;
    if(d.viewers) d.viewers.forEach(v=>{if(v.name&&v.name!==ME.name){if(!OTHERS[v.name])OTHERS[v.name]={x:8*TILE,y:14*TILE,color:v.color,gender:'male',walkAnim:0,bubble:null,bubbleTimer:0};OTHERS[v.name].color=v.color;}});
    return;
  }
  if(d.type==='bubble'){
    if(d.name&&d.name!==ME.name){
      if(!OTHERS[d.name])OTHERS[d.name]={x:LX*TILE,y:LY*TILE,color:d.color,gender:'male',walkAnim:0,bubble:null,bubbleTimer:0};
      OTHERS[d.name].bubble=d.text;OTHERS[d.name].bubbleTimer=240;
    }
    addChatMsg(d.name,d.color,d.text);return;
  }
  if(d.type==='reaction'){spawnFloatEmoji(d.emoji);return;}
  if(d.type==='warn'){toast(d.msg);return;}
  if(d.type==='banned'){toast('❌ '+d.msg);return;}
  if(d.type==='notif'){sysMsg(d.msg);return;}
}

function handleAction(){
  const p=ME;

  if(nearMacha&&p.phase==='idle'){document.getElementById('chat-input').focus();toast('💬 Ngobrol dengan Macha di chat!');return;}
  if(p.phase==='idle'){nearDock()?startCast():toast('Pergi ke dermaga dulu!');}
  else if(p.phase==='waiting'||p.phase==='nibble'){if(p.phase==='nibble')startReel();else toast('Tunggu ada gigitan...');}
  else if(p.phase==='reeling') doTap();

}

function startCast(){
  ME.phase='casting';ME.castTimer=0;

  ME.phase='reeling';ME.catchF=randFish();

  ME.tension=40;
  document.getElementById('fo-fish-bar-bg').style.display='block';

function doTap(){
  if(ME.phase!=='reeling')return;
  ME.catchHP-=16+Math.random()*14;ME.tension=Math.min(100,ME.tension+24);
  addSplash(LX*TILE,LY*TILE,3);updateBars();

  btn.style.background='rgba(0,200,50,.9)';setTimeout(()=>btn.style.background='rgba(0,120,20,.85)',120);

}

  const f=ME.catchF;ME.phase='caught';ME.catchAnim=0;ME.score+=f.pts;
  if(f.pts>0){ME.fishC++;if(!ME.inv[f.name])ME.inv[f.name]={fish:f,count:0};ME.inv[f.name].count++;if(!ME.best||f.pts>ME.best.pts)ME.best=f;}
  document.getElementById('fo-tap-btn').style.display='none';
  document.getElementById('fo-fish-info').textContent='';
  document.getElementById('fo-wait').textContent=(f.pts>0?'🏆 '+f.name+' tertangkap!':'😅 Dapat '+f.name+'...');
  addSplash(LX*TILE,LY*TILE,14);addRipple(LX*TILE,LY*TILE);
  addFloat(LX*TILE,LY*TILE,(f.pts>0?'+':'')+f.pts+' '+f.e,true);

// ═══════════════ RENDER HELPERS ═══════════════
function w2s(wx,wy){return{sx:wx-cam.x+W/2,sy:wy-cam.y+H/2};}
const TPALETTE={
  grass:['#2d5a1b','#336622','#3a7228','#2a5218'],
  water:['#0e3060','#122848','#0a2040'],
  swater:['#1a4870','#1e527a','#164060'],
  sand:['#c8a84a','#d4b255','#b89638'],
  dock:['#5a3a18','#6a4520','#4a2e12'],
  path:['#8a7a60','#9a8a70','#7a6a50'],
  hill:['#4a5a6a','#5a6a7a','#3a4a5a'],
};
function drawGround(){
  const sc=Math.max(0,Math.floor((cam.x-W/2)/TILE));
  const ec=Math.min(WW-1,Math.ceil((cam.x+W/2)/TILE));
  const sr=Math.max(0,Math.floor((cam.y-H/2)/TILE));
  const er=Math.min(WH-1,Math.ceil((cam.y+H/2)/TILE));
  for(let r=sr;r<=er;r++){
    for(let c=sc;c<=ec;c++){
      const t=MAP[r][c];if(t===8)continue; // houses drawn separately
      const {sx,sy}=w2s(c*TILE,r*TILE);
      const seed=(c*7+r*13)%4;
      if(t===1){
        const wave=Math.sin(T*.02+c*.4+r*.3)*.025;
        ctx.fillStyle=`hsl(${212+wave*8},${58+wave*5}%,${22+wave*4}%)`;
        ctx.fillRect(sx,sy,TILE+1,TILE+1);
        if((T+c*9+r*7)%40<5){ctx.fillStyle='rgba(180,220,255,.1)';ctx.fillRect(sx+TILE*.3,sy+TILE*.2,TILE*.3,TILE*.12);}
      } else {
        let col;
        if(t===2)col=TPALETTE.swater[seed%3];
        else if(t===3)col=TPALETTE.sand[seed%3];
        else if(t===4)col=TPALETTE.dock[seed%3];
        else if(t===5)col=TPALETTE.path[seed%3];
        else if(t===6)col=TPALETTE.hill[seed%3];
        else col=TPALETTE.grass[seed%4];
        ctx.fillStyle=col;ctx.fillRect(sx,sy,TILE+1,TILE+1);
        if(t===4){ctx.strokeStyle='rgba(0,0,0,.22)';ctx.lineWidth=1;for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(sx,sy+i*11);ctx.lineTo(sx+TILE,sy+i*11);ctx.stroke();}}
        if(t===5){ctx.fillStyle='rgba(0,0,0,.07)';ctx.fillRect(sx+3,sy+3,18,18);ctx.fillRect(sx+24,sy+24,18,18);}
        if(t===7){const fc=['#ff6688','#ffdd44','#aa88ff'];ctx.fillStyle=fc[(c*3+r*5)%3];ctx.beginPath();ctx.arc(sx+11,sy+9,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(sx+32,sy+29,2.5,0,Math.PI*2);ctx.fill();}
        if(t===3){ctx.fillStyle='rgba(180,160,90,.25)';ctx.fillRect(sx+8,sy+5,3,2);ctx.fillRect(sx+22,sy+20,4,2);}
      }
      ctx.strokeStyle='rgba(0,0,0,.05)';ctx.lineWidth=.5;ctx.strokeRect(sx,sy,TILE,TILE);
    }
  }
}

function drawHouses(){
  HOUSES.forEach(h=>{
    const {sx,sy}=w2s(h.tx*TILE,h.ty*TILE);
    if(sx>W+60||sx+h.w*TILE<-60||sy>H+60||sy+h.h*TILE<-60) return;
    const bw=h.w*TILE,bh=h.h*TILE;
    // Ground / foundation
    ctx.fillStyle='#5a4a30';ctx.fillRect(sx-3,sy+bh-4,bw+6,8);
    // Walls
    ctx.fillStyle=h.wall;ctx.fillRect(sx,sy+10,bw,bh-10);
    // Wall shading
    ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillRect(sx,sy+10,8,bh-10);
    ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(sx+bw-6,sy+10,6,bh-10);
    // Windows
    const wc='#88ccff';
    [[.2,.3],[.65,.3]].forEach(([xr,yr])=>{
      const wx=sx+bw*xr,wy=sy+bh*yr+10;
      ctx.fillStyle='#1a2a3a';ctx.fillRect(wx,wy,14,14);
      ctx.fillStyle=wc;ctx.fillRect(wx+1,wy+1,5,5);ctx.fillRect(wx+8,wy+1,5,5);
      ctx.fillRect(wx+1,wy+8,5,5);ctx.fillRect(wx+8,wy+8,5,5);
      ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.strokeRect(wx,wy,14,14);
    });
    // Door
    ctx.fillStyle='#3a2010';ctx.fillRect(sx+bw/2-7,sy+bh-22,14,22);
    ctx.fillStyle='#5a3820';ctx.fillRect(sx+bw/2-6,sy+bh-21,12,20);

function rrect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
  if(fill)ctx.fill();if(stroke)ctx.stroke();
}

}

function drawMinimap(){
  mctx.clearRect(0,0,78,78);
  const scl=78/Math.max(WW,WH);
  const tc={0:'#2d5a1b',1:'#0a2040',2:'#1a4870',3:'#c8a84a',4:'#5a3a18',5:'#8a7a60',6:'#4a5a6a',7:'#3a6a22',8:'#6a4020'};
  for(let r=0;r<WH;r++)for(let c=0;c<WW;c++){mctx.fillStyle=tc[MAP[r][c]]||'#2d5a1b';mctx.fillRect(c*scl,r*scl,scl+.5,scl+.5);}
  mctx.strokeStyle='rgba(255,255,255,.32)';mctx.lineWidth=1;const vx=(cam.x-W/2)/TILE*scl,vy=(cam.y-H/2)/TILE*scl;mctx.strokeRect(vx,vy,W/TILE*scl,H/TILE*scl);
  mctx.fillStyle=ME.color;mctx.beginPath();mctx.arc(ME.x/TILE*scl,ME.y/TILE*scl,3,0,Math.PI*2);mctx.fill();
  mctx.fillStyle='#c084fc';mctx.beginPath();mctx.arc(MACHA.x/TILE*scl,MACHA.y/TILE*scl,3,0,Math.PI*2);mctx.fill();
  Object.values(OTHERS).forEach(o=>{mctx.fillStyle=o.color;mctx.beginPath();mctx.arc(o.x/TILE*scl,o.y/TILE*scl,2.5,0,Math.PI*2);mctx.fill();});
}

function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,H*.4);
  g.addColorStop(0,'#060c1a');g.addColorStop(.5,'#0e1e38');g.addColorStop(1,'#162a50');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H*.4);
  for(let i=0;i<45;i++){const sx=(i*89)%W,sy=(i*41)%(H*.32);const b=.15+.35*Math.sin(T*.018+i*.7);ctx.fillStyle=`rgba(255,255,255,${b})`;ctx.fillRect(sx,sy,i%6===0?2:1,i%6===0?2:1);}
  ctx.fillStyle='#f8eec0';ctx.shadowColor='rgba(248,238,192,.2)';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(W*.85,H*.08,20,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#0e1e38';ctx.beginPath();ctx.arc(W*.85+8,H*.08-4,17,0,Math.PI*2);ctx.fill();
}

// ═══════════════ GAME UPDATE ═══════════════
function update(){
  if(!ME.name)return;
  T++;
  // Movement
  let dx=joyDX,dy=joyDY;
  if(keys['ArrowLeft']||keys['a'])dx-=1;if(keys['ArrowRight']||keys['d'])dx+=1;
  if(keys['ArrowUp']||keys['w'])dy-=1;if(keys['ArrowDown']||keys['s'])dy+=1;
  const len=Math.sqrt(dx*dx+dy*dy);if(len>1){dx/=len;dy/=len;}
  const spd=ME.phase==='reeling'?.4:2.6;
  const nx=ME.x+dx*spd,ny=ME.y+dy*spd;
  if(walkable(nx,ME.y))ME.x=nx;if(walkable(ME.x,ny))ME.y=ny;
  if(dx||dy)ME.walkAnim+=.18;

  // Camera smooth follow
  cam.x+=(ME.x-cam.x)*.1;cam.y+=(ME.y-cam.y)*.1;

  // FISHING STATE MACHINE
  if(ME.phase==='waiting'){
    ME.waitTimer+=16;
    // Meter animation
    const prog=ME.waitTimer/ME.waitMax;
    document.getElementById('fo-meter-fill').style.width=(prog*100)+'%';
    document.getElementById('fo-meter-fill').style.background=prog<.5?'#4488ff':prog<.8?'#44ff44':'#ff4444';
    if(ME.waitTimer>ME.waitMax){
      ME.phase='nibble';ME.nibbleTimer=0;
      document.getElementById('fo-wait').textContent='⚡ Ada yang nyangkut! Tap ACTION!';
      addRipple(LX*TILE,LY*TILE);addSplash(LX*TILE,LY*TILE,4);
      toast('⚡ Ada gigitan! Tap ACTION sekarang!',3000);updateActionBtn();
    }
  }
  if(ME.phase==='nibble'){
    ME.nibbleTimer+=16;
    // Blink meter
    const blink=Math.sin(T*.15)>.0;
    document.getElementById('fo-meter-fill').style.background=blink?'#ffff00':'#ff4400';
    document.getElementById('fo-meter-fill').style.width='100%';
    if(ME.nibbleTimer>3000){ME.phase='idle';ME.catchF=null;document.getElementById('fish-overlay').style.display='none';toast('Ikan kabur 😢');updateActionBtn();}
  }
  if(ME.phase==='reeling'){
    ME.tension=Math.max(0,ME.tension-.16);updateBars();
    if(ME.tension>=100){lineBroke();return;}
    if(ME.tension<10&&T%90===0)ME.catchHP=Math.min(ME.catchMaxHP,ME.catchHP+5);
    ME.catchAnim+=.03;
    if(T%35===0)addRipple(LX*TILE,LY*TILE,12);
  }
  if(ME.phase==='caught')ME.catchAnim+=.06;
  if(ME.selfBubbleTimer>0)ME.selfBubbleTimer--;
  Object.values(OTHERS).forEach(o=>{if(o.bubbleTimer>0)o.bubbleTimer--;});
  if(T%55===0)addRipple((LX-2+Math.random()*4)*TILE,(LY-2+Math.random()*4)*TILE);

  // Hints
  const nearMacha=distToNPC(MACHA)<MACHA.talkRange;
  document.getElementById('npc-hint').style.display=(nearMacha&&ME.phase==='idle')?'block':'none';
  document.getElementById('hint').style.display=(nearDock()&&ME.phase==='idle'&&!nearMacha)?'block':'none';
}

// ═══════════════ RENDER ═══════════════
function render(){
  if(!ME.name){ctx.fillStyle='#060e1e';ctx.fillRect(0,0,W,H);return;}
  ctx.clearRect(0,0,W,H);
  drawSky();drawGround();

  // Sort all entities by Y
  const drawables=[];
  const vis=TREES.filter(t=>{const{sx,sy}=w2s(t.tx*TILE,t.ty*TILE);return sx>-80&&sx<W+80&&sy>-140&&sy<H+80;});
  vis.sort((a,b)=>a.ty-b.ty);
  vis.forEach(t=>drawables.push({y:t.ty*TILE+TILE,fn:()=>drawTrees_single(t)}));
  ROCKS.forEach(r=>{const{sx,sy}=w2s(r.tx*TILE,r.ty*TILE);if(sx>-40&&sx<W+40&&sy>-40&&sy<H+40)drawables.push({y:r.ty*TILE,fn:()=>drawRock_single(r)});});
  // NPC Macha
  drawables.push({y:MACHA.y,fn:()=>drawMacha()});
  // Other players
  Object.entries(OTHERS).forEach(([n,o])=>{drawables.push({y:o.y,fn:()=>{const{sx,sy}=w2s(o.x,o.y);drawChar(sx,sy,o.color,o.gender||'male',o.walkAnim||0,'idle',false,n,o.bubble,o.bubbleTimer);}});});
  // Me
  drawables.push({y:ME.y,fn:()=>{const{sx,sy}=w2s(ME.x,ME.y);drawChar(sx,sy,ME.color,ME.gender,ME.walkAnim,ME.phase,true,ME.name,ME.selfBubble,ME.selfBubbleTimer);drawBobber();drawCaughtFish();}});

  drawSwimFish();
  drawables.sort((a,b)=>a.y-b.y);
  drawables.forEach(d=>d.fn());
  drawHouses();
  drawEffects();
  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,W*.12,W/2,H/2,W*.72);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(4,10,22,.55)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  drawMinimap();
}
function drawTrees_single(t){
  const{sx,sy}=w2s(t.tx*TILE+TILE/2,t.ty*TILE+TILE/2);
  const s=t.s,v=t.v;
  ctx.fillStyle='rgba(0,0,0,.13)';ctx.beginPath();ctx.ellipse(sx,sy+6,14*s,5*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=v===0?'#4a2810':v===1?'#3a2008':'#5a3818';ctx.fillRect(sx-4*s,sy-26*s,8*s,26*s);
  const layers=v===0?[{y:-22,r:20,c:'#1a5c10'},{y:-37,r:16,c:'#206814'},{y:-50,r:11,c:'#2a7c1c'}]:v===1?[{y:-20,r:18,c:'#0e4808'},{y:-35,r:14,c:'#125a0c'},{y:-46,r:10,c:'#186010'}]:[{y:-23,r:21,c:'#1e6412'},{y:-40,r:17,c:'#247418'},{y:-54,r:12,c:'#2a841e'}];
  layers.forEach(l=>{ctx.fillStyle=l.c;ctx.beginPath();ctx.ellipse(sx,sy+l.y*s,l.r*s,l.r*.72*s,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.06)';ctx.beginPath();ctx.ellipse(sx-l.r*.25*s,sy+(l.y-.22*l.r)*s,l.r*.32*s,l.r*.22*s,-.4,0,Math.PI*2);ctx.fill();});
}
function drawRock_single(r){
  const{sx,sy}=w2s(r.tx*TILE+TILE/2,r.ty*TILE+TILE/2);const s=r.s;
  ctx.fillStyle='rgba(0,0,0,.1)';ctx.beginPath();ctx.ellipse(sx,sy+5,13*s,5*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5a5a6a';ctx.beginPath();ctx.ellipse(sx,sy-4*s,12*s,8*s,-.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6e6e7e';ctx.beginPath();ctx.ellipse(sx-2,sy-6*s,7*s,5.5*s,-.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.beginPath();ctx.ellipse(sx-3,sy-8*s,3*s,1.8*s,-.5,0,Math.PI*2);ctx.fill();
}

let lastT=0;
function loop(ts){const dt=Math.min(ts-lastT,50);lastT=ts;update();render();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
