<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Scene — Blue Archive</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Sans',sans-serif;}

.scene{position:relative;width:100%;height:100vh;overflow:hidden;cursor:pointer;user-select:none;background:#0d1b2a;}

.sc-bg{position:absolute;inset:0;background:url('https://i.ytimg.com/vi/jTO5gy_4MxQ/maxresdefault.jpg') center/cover no-repeat;transition:filter 0.8s;}
.sc-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.5) 100%);pointer-events:none;}
.sc-darkbg{position:absolute;inset:0;background:rgba(0,0,0,0);pointer-events:none;transition:background 1s;z-index:1;}
.sc-darkbg.dim{background:rgba(0,0,0,0.25);}
.sc-flash{position:absolute;inset:0;background:rgba(255,255,255,0);pointer-events:none;transition:background 0.1s;z-index:10;}
.sc-flash.pop{background:rgba(255,255,255,0.2);}
.sc-fade{position:absolute;inset:0;background:#000;pointer-events:none;z-index:50;transition:opacity 1.2s;}
.sc-fade.out{opacity:0;}

.sc-char{
    position:absolute;
    bottom:0;
    height:90%;
    object-fit:contain;
    object-position:bottom center;
    pointer-events:none;
    transition:left 0.7s cubic-bezier(.4,0,.2,1),
               transform 0.7s cubic-bezier(.4,0,.2,1),
               opacity 0.5s ease,
               filter 0.4s ease;
  }

  /* Macha starts center */
  #charMacha{
    left:50%;
    transform:translateX(-50%);
    opacity:0;
    z-index:2;
  }
  #charMacha.show   { opacity:1; }
  #charMacha.slide-left{
    left:22%;
    transform:translateX(-50%);
  }
  #charMacha.darken { filter:brightness(0.55); }

  /* Master hidden off-screen right */
  #charMaster{
    left:120%;
    transform:translateX(-50%);
    height:75%;
    opacity:0;
    z-index:3;
    image-rendering:auto;
    /* stick figure is on white bg — multiply blends it */
    mix-blend-mode:multiply;
  }
  #charMaster.show   { opacity:1; }
  #charMaster.slide-in{
    left:74%;
    transform:translateX(-50%);
  }


.sc-gradient{position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(13,27,42,0) 0%,rgba(13,27,42,0.75) 35%,rgba(13,27,42,0.92) 60%,rgba(13,27,42,0.95) 100%);pointer-events:none;z-index:10;}
.sc-line{position:absolute;left:4%;right:4%;bottom:23%;height:1px;background:rgba(255,255,255,0.45);pointer-events:none;opacity:0;transition:opacity 0.4s;z-index:11;}
.sc-line.show{opacity:1;}
.sc-nameblock{position:absolute;left:5%;bottom:24.5%;pointer-events:none;opacity:0;transition:opacity 0.4s;z-index:11;}
.sc-nameblock.show{opacity:1;}
.sc-name{font-family:'Noto Sans',sans-serif;font-size:clamp(14px,2.4vw,28px);font-weight:700;color:#fff;
  text-shadow:0 0 6px #1a2f46,-1px -1px 0 #1a2f46,1px -1px 0 #1a2f46,-1px 1px 0 #1a2f46,1px 1px 0 #1a2f46;line-height:1;}
.sc-affiliation{display:inline-block;margin-left:10px;font-family:'Noto Sans',sans-serif;font-size:clamp(10px,1.7vw,18px);
  font-weight:700;color:#7accf9;text-shadow:0 0 4px #1a2f46,-1px -1px 0 #1a2f46,1px 1px 0 #1a2f46;vertical-align:middle;}
.sc-dialogue{
      position:absolute;
      left:5%;
      right:5%;
      bottom:8%;

      font-family:'Noto Sans',sans-serif;
      font-size:clamp(13px,1.9vw,21px);
      line-height:1.6;
      color:#fff;

      white-space:pre-wrap;
      word-break:break-word;

      max-height:20vh; /* lebih tinggi */
      overflow:hidden; /* hilangkan scrollbar */

      z-index:11;
  }
.sc-triangle{position:absolute;right:4.5%;bottom:9%;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:11;}
.sc-triangle.show{opacity:1;}
.sc-triangle svg{width:clamp(10px,1.4vw,18px);fill:#fff;filter:drop-shadow(0 0 3px rgba(77,217,255,0.7));}

/* ── CHOICE BOX ── */
.choice-box{
  position:absolute;left:50%;bottom:6%;transform:translateX(-50%);
  display:flex;flex-direction:column;gap:8px;
  width:min(560px,90%);
  z-index:20;
  opacity:0;pointer-events:none;transition:opacity 0.4s;
}
.choice-box.show{opacity:1;pointer-events:all;}
.choice-btn{
  font-family:'Rajdhani',sans-serif;font-size:clamp(13px,1.7vw,18px);font-weight:600;letter-spacing:1px;
  padding:10px 20px;
  background:rgba(13,27,42,0.88);
  border:1px solid rgba(77,217,255,0.4);
  color:#e8f4ff;
  cursor:pointer;text-align:left;border-radius:2px;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:background 0.15s,border-color 0.15s,transform 0.1s;
}
.choice-btn::before{content:'▸';color:#4dd9ff;margin-right:10px;}
.choice-btn:hover{background:rgba(30,60,90,0.92);border-color:rgba(77,217,255,0.8);transform:translateX(4px);}
.choice-btn:active{transform:translateX(2px);}

/* ── ROUTE BADGE ── */
.route-badge{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:3px;
  padding:4px 14px;border-radius:2px;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  z-index:20;opacity:0;transition:opacity 0.5s;pointer-events:none;
}
.route-badge.show{opacity:1;}
.route-badge.route-kind{background:rgba(77,217,255,0.15);border:1px solid rgba(77,217,255,0.4);color:#7accf9;}
.route-badge.route-bold{background:rgba(255,180,60,0.15);border:1px solid rgba(255,180,60,0.4);color:#f5c842;}
.route-badge.route-shy {background:rgba(160,100,220,0.15);border:1px solid rgba(160,100,220,0.4);color:#c8a0f0;}

/* ── ENDING CARD ── */
.ending-card{
  position:absolute;inset:0;z-index:40;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:rgba(5,14,26,0.88);
  opacity:0;pointer-events:none;transition:opacity 0.6s;
}
.ending-card.show{opacity:1;pointer-events:all;}
.ending-icon{font-size:clamp(28px,4vw,48px);}
.ending-title{font-family:'Rajdhani',sans-serif;font-size:clamp(18px,3vw,32px);font-weight:700;color:#fff;letter-spacing:4px;text-transform:uppercase;text-align:center;}
.ending-sub{font-size:clamp(12px,1.5vw,16px);color:rgba(160,200,230,0.7);text-align:center;max-width:420px;line-height:1.7;}
.ending-sep{width:120px;height:1px;background:rgba(77,217,255,0.25);}
.back-btn{
  font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;
  padding:11px 32px;border:1px solid rgba(77,217,255,0.5);
  background:rgba(77,217,255,0.08);color:#7accf9;
  cursor:pointer;border-radius:2px;text-transform:uppercase;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:background 0.2s,border-color 0.2s;margin-top:8px;
}
.back-btn:hover{background:rgba(77,217,255,0.18);border-color:rgba(77,217,255,0.8);}
.replay-btn{
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;
  padding:8px 24px;border:1px solid rgba(255,255,255,0.15);
  background:transparent;color:rgba(255,255,255,0.45);
  cursor:pointer;border-radius:2px;text-transform:uppercase;
  transition:all 0.2s;
}
.replay-btn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);}

.hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Rajdhani',sans-serif;font-size:clamp(12px,1.5vw,18px);letter-spacing:3px;
  color:rgba(255,255,255,0.6);text-transform:uppercase;pointer-events:none;
  animation:pulse 2s ease-in-out infinite;z-index:15;}

@keyframes pulse{0%,100%{opacity:0.6;}50%{opacity:0.15;}}
@keyframes triFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
.sc-triangle.show svg{animation:triFloat 1.2s ease-in-out infinite;}
</style>
</head>

<div class="scene" id="scene" onclick="handleSceneClick()">

  <div class="sc-line"      id="scLine"></div>
  <div class="sc-nameblock" id="scNameBlock">
    <span class="sc-name" id="scName"></span><span class="sc-affiliation" id="scAff"></span>
  </div>
  <div class="sc-dialogue"  id="scDialogue"></div>
  <div class="sc-triangle"  id="scTriangle">
    <svg viewBox="0 0 16 16"><polygon points="8,14 0,2 16,2"/></svg>
  </div>

  <!-- choices -->
  <div class="choice-box" id="choiceBox"></div>

  <!-- route badge -->
  <div class="route-badge" id="routeBadge"></div>

  <!-- ending card -->
  <div class="ending-card" id="endingCard">
    <div class="ending-icon"  id="endIcon">✨</div>
    <div class="ending-title" id="endTitle">END</div>
    <div class="ending-sep"></div>

  <div class="hint" id="hint">Click anywhere to begin</div>

</div>

// ============================================================
// AUDIO
// ============================================================
const sndTyping = new Audio('https://www.myinstants.com/media/sounds/blue-archive-respond-chat.mp3');
sndTyping.volume = 0.55;

const sndCat = new Audio('https://static.wikitide.net/bluearchivewiki/transcoded/d/d8/SE_Cat_01.wav/SE_Cat_01.wav.ogg');
sndCat.volume = 0.8;

const sndChoice = new Audio('https://www.myinstants.com/media/sounds/blue-archive-respond-chat.mp3');
sndChoice.volume = 0.4;
sndChoice.playbackRate = 1.6;

const sndBgm = new Audio('https://static.wikitide.net/bluearchivewiki/3/3a/Track_15_Mitsukiyo_Honey_Jam.ogg');
sndBgm.loop   = true;
sndBgm.volume = 0.4;

let bgmStarted = false;
function startBgm(){
  if(bgmStarted) return;
  bgmStarted = true;
  sndBgm.play().catch(()=>{});
}

let typingBeepCounter = 0;
function playTypingBeep(){
  typingBeepCounter++;
  if(typingBeepCounter % 2 !== 0) return;
  sndTyping.currentTime = 0;
  sndTyping.play().catch(()=>{});
}

function playChoiceSfx(){
  sndChoice.currentTime = 0;
  sndChoice.play().catch(()=>{});
}

// ============================================================
// ENGINE
// ============================================================
let currentRoute = 'main';
let stepIdx      = 0;
let typing       = false;
let tyTimer      = null;
let inTrans      = false;
let choosingMode = false;
let started      = false;

const hint        = document.getElementById('hint');
const charMacha   = document.getElementById('charMacha');
const charMaster  = document.getElementById('charMaster');
const scLine      = document.getElementById('scLine');
const scNameBlock = document.getElementById('scNameBlock');
const scName      = document.getElementById('scName');
const scAff       = document.getElementById('scAff');
const scDialogue  = document.getElementById('scDialogue');
const scTriangle  = document.getElementById('scTriangle');
const scFlash     = document.getElementById('scFlash');
const scDarkBg    = document.getElementById('scDarkBg');
const choiceBox   = document.getElementById('choiceBox');
const routeBadge  = document.getElementById('routeBadge');
const endingCard  = document.getElementById('endingCard');
const scFade      = document.getElementById('scFade');

// ── helpers ──
function show(el){ el.classList.add('show'); }
function hide(el){ el.classList.remove('show'); }

function flash(){
  scFlash.classList.add('pop');
  setTimeout(()=>scFlash.classList.remove('pop'), 200);
}

// ── set Macha's sprite based on the current line's expression flag ──
function setMachaExpression(entry){
  const isMachaLine = entry.speaker === 'macha' || entry.speaker === 'unknown';
  if(!isMachaLine) return;

  let exprKey = 'normal';
  for(const key in MACHA_SPRITES){
    if(key !== 'normal' && entry[key] === true){
      exprKey = key;
      break;
    }
  }

  const targetSrc = MACHA_SPRITES[exprKey] || MACHA_SPRITES.normal;
  if(charMacha.getAttribute('src') !== targetSrc){
    charMacha.setAttribute('src', targetSrc);
  }
}

// ── typewriter ──
function typewrite(text){
  scDialogue.textContent = '';
  typing = true;
  typingBeepCounter = 0;
  let i = 0;
  const tick = () => {
    const ch = text.charAt(i);
    scDialogue.textContent += ch;
    if(ch !== '\n') playTypingBeep();
    i++;
    if(i < text.length) tyTimer = setTimeout(tick, 42);
    else { typing = false; show(scTriangle); }
  };
  tick();
}

// ── show dialogue line ──
function showLine(entry){
  scName.textContent = entry.name || '';
  scAff.textContent  = entry.aff  || '';
  show(scLine); show(scNameBlock);

  const isMacha = entry.speaker === 'macha' || entry.speaker === 'unknown';
  if(isMacha){ charMacha.classList.remove('darken'); charMaster.classList.add('darken'); }
  else        { charMaster.classList.remove('darken'); charMacha.classList.add('darken'); }

  // swap Macha's sprite to the blush expression (or back to normal)
  setMachaExpression(entry);

  if(entry.surprise) flash();
  hide(scTriangle); hide(choiceBox);
  choosingMode = false;
  typewrite(entry.text);
}

// ── show choice buttons ──
function showChoice(entry){
  hide(scTriangle);
  typing = false;
  choosingMode = true;
  scDialogue.textContent = '';
  scName.textContent = ''; scAff.textContent = '';
  hide(scNameBlock); hide(scLine);
  choiceBox.innerHTML = '';
  entry.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = e => { e.stopPropagation(); playChoiceSfx(); selectRoute(c.route); };
    choiceBox.appendChild(btn);
  });
  show(choiceBox);
}

// ── transition: Macha slides left, Master slides in ──
function doTransition(onDone){
  inTrans = true;
  scDialogue.textContent = ''; scName.textContent = ''; scAff.textContent = '';
  hide(scTriangle); hide(scNameBlock); hide(scLine);
  charMacha.setAttribute('src', MACHA_SPRITES.normal); // reset expression before the transition
  charMacha.classList.add('slide-left', 'darken');
  scDarkBg.classList.add('dim');
  setTimeout(() => {
    sndCat.currentTime = 0;
    sndCat.play().catch(()=>{});
    show(charMaster);
    charMaster.classList.add('slide-in');
    setTimeout(() => { inTrans = false; if(onDone) onDone(); }, 700);
  }, 500);
}

// ── route badge flash ──
function showBadge(entry, onDone){
  routeBadge.textContent = entry.text;
  routeBadge.className   = 'route-badge show ' + entry.cls;
  setTimeout(() => {
    routeBadge.classList.remove('show');
    if(onDone) onDone();
  }, 2000);
}

// ── ending screen ──
function showEnding(entry){
  document.getElementById('endIcon').textContent  = entry.icon  || '✨';
  document.getElementById('endTitle').textContent = entry.title || 'END';
  document.getElementById('endSub').textContent   = entry.sub   || '';
  hide(choiceBox);
  setTimeout(() => show(endingCard), 600);
}

// ── select route ──
function selectRoute(route){
  hide(choiceBox);
  choosingMode = false;
  currentRoute = route;
  stepIdx = 0;
  playStep();
}

// ── play current step ──
function playStep(){
  const script = SCRIPTS[currentRoute];
  if(!script || stepIdx >= script.length) return;
  const entry = script[stepIdx];

  if(entry.type === 'badge'){
    showBadge(entry, () => { stepIdx++; playStep(); });
  } else if(entry.type === 'choice'){
    showChoice(entry);
  } else if(entry.type === 'transition'){
    doTransition(() => { stepIdx++; playStep(); });
  } else if(entry.type === 'ending'){
    showEnding(entry);
  } else {
    showLine(entry);
  }
}

// ── main click handler ──
function handleSceneClick(){
  if(choosingMode || inTrans) return;

  if(!started){
    started = true;
    startBgm();
    hint.style.display = 'none';
    show(charMacha);
    setTimeout(() => { show(scLine); show(scNameBlock); }, 300);
    currentRoute = 'main';
    stepIdx = 0;
    showLine(SCRIPTS.main[0]);
    return;
  }

  // skip typewriter
  if(typing){
    clearTimeout(tyTimer);
    typing = false;
    const cur = SCRIPTS[currentRoute][stepIdx];
    if(cur && cur.text) scDialogue.textContent = cur.text;
    show(scTriangle);
    return;
  }

  // advance
  stepIdx++;
  const script = SCRIPTS[currentRoute];
  if(!script || stepIdx >= script.length) return;
  const entry = script[stepIdx];
  if(!entry) return;

  if(entry.type === 'badge')        showBadge(entry, () => { stepIdx++; playStep(); });
  else if(entry.type === 'choice')  showChoice(entry);
  else if(entry.type === 'transition') doTransition(() => { stepIdx++; playStep(); });
  else if(entry.type === 'ending')  showEnding(entry);
  else                              showLine(entry);
}

// ── navigation ──
function goBack() {
    window.location.href = '/';
}

function replayScene(){
  sndBgm.pause();
  sndBgm.currentTime = 0;
  bgmStarted = false;
  endingCard.classList.remove('show');
  charMacha.className  = 'sc-char';
  charMaster.className = 'sc-char';
  charMacha.setAttribute('src', MACHA_SPRITES.normal); // reset expression on replay
  scDarkBg.classList.remove('dim');
  hide(scLine); hide(scNameBlock); hide(scTriangle); hide(choiceBox);
  routeBadge.className = 'route-badge';
  scDialogue.textContent = ''; scName.textContent = ''; scAff.textContent = '';

  currentRoute = 'main'; stepIdx = 0;
  typing = false; inTrans = false; choosingMode = false; started = false;

  scFade.style.opacity = '1'; scFade.style.transition = 'none';
  setTimeout(() => { scFade.style.transition = 'opacity 1.2s'; scFade.classList.add('out'); }, 100);
  hint.style.display = '';
}

// ── fade in on load ──
window.onload = () => {
  setTimeout(() => { scFade.style.transition = 'opacity 1.2s'; scFade.classList.add('out'); }, 300);
};
</script>
